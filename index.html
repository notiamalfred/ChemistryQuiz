<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Quiz Mobile App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #e0f7fa 0%, #bbdefb 100%);
            color: #333;
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        #app {
            max-width: 100%;
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 20px;
            margin: 20px 0;
        }
        
        .header {
            text-align: center;
            padding: 20px 0;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2196f3 0%, #0d47a1 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }
        
        .logo i {
            font-size: 36px;
            color: white;
        }
        
        h1 {
            font-size: 28px;
            color: #1565c0;
            margin-bottom: 10px;
        }
        
        p {
            font-size: 16px;
            color: #616161;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            background: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            margin: 12px 0;
            text-align: left;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .btn-content {
            flex: 1;
            padding-left: 15px;
        }
        
        .btn-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .classic .btn-icon {
            background: rgba(33, 150, 243, 0.1);
            color: #2196f3;
        }
        
        .endless .btn-icon {
            background: rgba(103, 58, 183, 0.1);
            color: #673ab7;
        }
        
        .btn-title {
            font-size: 20px;
            font-weight: 600;
            color: #212121;
            margin-bottom: 4px;
        }
        
        .btn-subtitle {
            font-size: 14px;
            color: #757575;
        }
        
        .question-card {
            width: 100%;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        
        .card-header {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            color: white;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .element-name {
            font-size: 20px;
            font-weight: 600;
        }
        
        .question-type {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .question-count {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .card-content {
            padding: 20px;
        }
        
        .question-text {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 25px;
            color: #212121;
            line-height: 1.4;
        }
        
        .answer-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 18px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        
        .answer-input:focus {
            outline: none;
            border-color: #2196f3;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s;
            cursor: pointer;
        }
        
        .submit-btn:active {
            background: #1976d2;
        }
        
        .submit-btn i {
            margin-right: 8px;
        }
        
        .feedback {
            padding: 15px;
            background: #f5f5f5;
            border-radius: 12px;
            margin-top: 20px;
            display: flex;
            align-items: center;
        }
        
        .feedback i {
            margin-right: 10px;
            font-size: 18px;
        }
        
        .correct {
            color: #4caf50;
        }
        
        .incorrect {
            color: #f44336;
        }
        
        .results-container {
            text-align: center;
            padding: 20px;
        }
        
        .results-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(33, 150, 243, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #2196f3;
            font-size: 36px;
        }
        
        .score-display {
            background: #f5f5f5;
            border-radius: 16px;
            padding: 25px;
            margin: 25px 0;
        }
        
        .score {
            font-size: 48px;
            font-weight: 700;
            color: #2196f3;
        }
        
        .total {
            font-size: 18px;
            color: #757575;
            margin-top: 5px;
        }
        
        .action-btn {
            padding: 16px 30px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            margin: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
            cursor: pointer;
        }
        
        .action-btn:active {
            background: #1976d2;
        }
        
        .action-btn i {
            margin-right: 8px;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e3f2fd;
            border-top: 5px solid #2196f3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .quit-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 20px;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="container loading">
            <div class="spinner"></div>
            <p>Loading quiz questions...</p>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="container hidden">
            <div class="header">
                <div class="logo">
                    <i class="fas fa-atom"></i>
                </div>
                <h1>Chemistry Quiz</h1>
                <p>Test your knowledge of the first 20 elements!</p>
            </div>

            <div class="btn classic" onclick="startGame('classic')">
                <div class="btn-icon">
                    <i class="fas fa-brain"></i>
                </div>
                <div class="btn-content">
                    <div class="btn-title">Classic Quiz</div>
                    <div class="btn-subtitle">10 random questions</div>
                </div>
            </div>

            <div class="btn endless" onclick="startGame('endless')">
                <div class="btn-icon">
                    <i class="fas fa-bolt"></i>
                </div>
                <div class="btn-content">
                    <div class="btn-title">Endless Mode</div>
                    <div class="btn-subtitle">Until you miss!</div>
                </div>
            </div>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="container hidden">
            <div class="question-card">
                <div class="card-header">
                    <div>
                        <div class="element-name" id="element-name">Hydrogen</div>
                        <div class="question-type" id="question-type">Atomic Number</div>
                    </div>
                    <div>
                        <div class="question-count" id="question-count">1/10</div>
                        <button class="quit-btn" onclick="quitQuiz()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>

                <div class="card-content">
                    <div class="question-text" id="question-text">What is the atomic number of Hydrogen?</div>
                    
                    <input type="text" class="answer-input" id="answer-input" placeholder="Type your answer here...">
                    
                    <button class="submit-btn" onclick="checkAnswer()">
                        <i class="fas fa-paper-plane"></i> Submit
                    </button>
                    
                    <div id="feedback" class="feedback hidden">
                        <i class="fas fa-bullseye"></i>
                        <span id="feedback-text">Correct! Answer: 1</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="container hidden">
            <div class="results-container">
                <div class="results-icon">
                    <i class="fas fa-trophy" id="results-icon"></i>
                </div>
                <h2 id="results-title">Quiz Complete!</h2>
                <p id="results-message">Great job!</p>
                
                <div class="score-display">
                    <div class="score" id="score">8</div>
                    <div class="total" id="total">out of 10</div>
                </div>
                
                <button class="action-btn" onclick="restartQuiz()">
                    <i class="fas fa-redo"></i> Play Again
                </button>
            </div>
        </div>
    </div>

    <script>
        // 1. Clean, maintainable data source
        const elementsData = [
            { number: 1, name: "Hydrogen", symbol: "H" },
            { number: 2, name: "Helium", symbol: "He" },
            { number: 3, name: "Lithium", symbol: "Li" },
            { number: 4, name: "Beryllium", symbol: "Be" },
            { number: 5, name: "Boron", symbol: "B" },
            { number: 6, name: "Carbon", symbol: "C" },
            { number: 7, name: "Nitrogen", symbol: "N" },
            { number: 8, name: "Oxygen", symbol: "O" },
            { number: 9, name: "Fluorine", symbol: "F" },
            { number: 10, name: "Neon", symbol: "Ne" },
            { number: 11, name: "Sodium", symbol: "Na" },
            { number: 12, name: "Magnesium", symbol: "Mg" },
            { number: 13, name: "Aluminum", symbol: "Al" },
            { number: 14, name: "Silicon", symbol: "Si" },
            { number: 15, name: "Phosphorus", symbol: "P" },
            { number: 16, name: "Sulfur", symbol: "S" },
            { number: 17, name: "Chlorine", symbol: "Cl" },
            { number: 18, name: "Argon", symbol: "Ar" },
            { number: 19, name: "Potassium", symbol: "K" },
            { number: 20, name: "Calcium", symbol: "Ca" }
        ];

        // 2. Dynamically generate all 80 questions
        function generateQuizData() {
            let generatedQuestions = [];
            let idCounter = 1;

            elementsData.forEach(el => {
                generatedQuestions.push(
                    { id: idCounter++, question: `What is the atomic number of ${el.name}?`, correct_answer: el.number.toString(), element_name: el.name, question_type: "atomic_number" },
                    { id: idCounter++, question: `What is the chemical symbol for ${el.name}?`, correct_answer: el.symbol, element_name: el.name, question_type: "chemical_symbol" },
                    { id: idCounter++, question: `Which element has the atomic number of ${el.number}?`, correct_answer: el.name, element_name: el.name, question_type: "element_from_atomic_number" },
                    { id: idCounter++, question: `Which element has the chemical symbol of ${el.symbol}?`, correct_answer: el.name, element_name: el.name, question_type: "element_from_symbol" }
                );
            });
            return generatedQuestions;
        }

        // App state
        let allQuestions = [];
        let quizQuestions = [];
        let currentQuestionIndex = 0;
        let isCorrect = false;
        let showFeedback = false;
        let score = 0;
        let quizStarted = false;
        let quizCompleted = false;
        let gameMode = null;

        // DOM elements
        const loadingScreen = document.getElementById('loading-screen');
        const startScreen = document.getElementById('start-screen');
        const questionScreen = document.getElementById('question-screen');
        const resultsScreen = document.getElementById('results-screen');
        const answerInput = document.getElementById('answer-input');
        const feedback = document.getElementById('feedback');
        const feedbackText = document.getElementById('feedback-text');
        const resultsIcon = document.getElementById('results-icon');
        const resultsTitle = document.getElementById('results-title');
        const resultsMessage = document.getElementById('results-message');
        const scoreElement = document.getElementById('score');
        const totalElement = document.getElementById('total');

        // Initialize the app
        function initApp() {
            allQuestions = generateQuizData(); // Generate data on load
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
                startScreen.classList.remove('hidden');
            }, 1500);
        }

        // Start the game
        function startGame(mode) {
            gameMode = mode;
            score = 0;
            currentQuestionIndex = 0;
            quizCompleted = false;
            showFeedback = false;
            isCorrect = false;

            const shuffled = shuffleArray([...allQuestions]);
            quizQuestions = mode === 'classic' ? shuffled.slice(0, 10) : shuffled;

            startScreen.classList.add('hidden');
            questionScreen.classList.remove('hidden');
            quizStarted = true;

            displayQuestion();
        }

        // Shuffle array
        function shuffleArray(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // Display current question
        function displayQuestion() {
            if (quizQuestions.length === 0 || !quizQuestions[currentQuestionIndex]) return;

            const question = quizQuestions[currentQuestionIndex];
            
            // FIX: Hide the element name if the question asks for the element!
            if (question.question_type === 'element_from_atomic_number' || question.question_type === 'element_from_symbol') {
                document.getElementById('element-name').textContent = "Mystery Element";
            } else {
                document.getElementById('element-name').textContent = question.element_name;
            }
            
            let typeText = "";
            if (question.question_type === 'atomic_number') {
                typeText = "Atomic Number";
                answerInput.setAttribute('inputmode', 'numeric'); // Mobile number pad
            } else if (question.question_type === 'chemical_symbol') {
                typeText = "Chemical Symbol";
                answerInput.setAttribute('inputmode', 'text'); // Standard keyboard
            } else if (question.question_type === 'element_from_atomic_number') {
                typeText = "Identify Element";
                answerInput.setAttribute('inputmode', 'text');
            } else if (question.question_type === 'element_from_symbol') {
                typeText = "Identify Element";
                answerInput.setAttribute('inputmode', 'text');
            }
            
            document.getElementById('question-type').textContent = typeText;
            document.getElementById('question-text').textContent = question.question;
            
            document.getElementById('question-count').textContent = gameMode === 'classic' ? 
                `${currentQuestionIndex + 1}/${quizQuestions.length}` : score;

            answerInput.value = '';
            feedback.classList.add('hidden');
            answerInput.focus();
        }

        // Check answer
        function checkAnswer() {
            if (showFeedback) return;

            // Strip spaces from user input to be more forgiving
            const userAnswer = answerInput.value.trim().replace(/\s+/g, '');
            if (!userAnswer) return;

            const currentQuestion = quizQuestions[currentQuestionIndex];
            const correct = userAnswer.toLowerCase() === currentQuestion.correct_answer.toLowerCase();

            isCorrect = correct;
            showFeedback = true;

            if (correct) {
                score++;
                feedback.className = 'feedback correct';
                feedbackText.innerHTML = `<span class="correct">Correct!</span> Answer: ${currentQuestion.correct_answer}`;
            } else {
                feedback.className = 'feedback incorrect';
                feedbackText.innerHTML = `<span class="incorrect">Incorrect.</span> Answer: ${currentQuestion.correct_answer}`;
            }

            if (gameMode === 'classic') {
                setTimeout(() => {
                    if (currentQuestionIndex + 1 < quizQuestions.length) {
                        currentQuestionIndex++;
                        showFeedback = false;
                        displayQuestion();
                    } else {
                        showResults();
                    }
                }, 1500);
            } else {
                if (correct) {
                    setTimeout(() => {
                        currentQuestionIndex++;
                        if (currentQuestionIndex >= quizQuestions.length) {
                            quizQuestions = shuffleArray([...allQuestions]);
                            currentQuestionIndex = 0;
                        }
                        showFeedback = false;
                        displayQuestion();
                    }, 1500);
                } else {
                    score = currentQuestionIndex;
                    setTimeout(showResults, 1500);
                }
            }
        }

        // Show results
        function showResults() {
            questionScreen.classList.add('hidden');
            resultsScreen.classList.remove('hidden');
            quizCompleted = true;

            scoreElement.textContent = score;
            
            if (gameMode === 'classic') {
                totalElement.textContent = `out of ${quizQuestions.length}`;
                
                let message = "Keep practicing!";
                let icon = "trophy";
                
                const percentage = Math.round((score / quizQuestions.length) * 100);
                if (percentage >= 90) {
                    message = "Outstanding!";
                    icon = "crown";
                } else if (percentage >= 80) {
                    message = "Excellent!";
                    icon = "award";
                } else if (percentage >= 70) {
                    message = "Great job!";
                    icon = "thumbs-up";
                }
                
                resultsTitle.textContent = "Quiz Complete!";
                resultsMessage.textContent = message;
                resultsIcon.className = `fas fa-${icon}`;
            } else {
                totalElement.textContent = "correct answers";
                resultsTitle.textContent = "Streak Over!";
                resultsMessage.textContent = "Nice Streak!";
                resultsIcon.className = "fas fa-bolt";
            }
        }

        // Restart quiz
        function restartQuiz() {
            resultsScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            quizStarted = false;
        }

        // Quit quiz
        function quitQuiz() {
            if (confirm("Are you sure you want to quit?")) {
                questionScreen.classList.add('hidden');
                startScreen.classList.remove('hidden');
                quizStarted = false;
                quizCompleted = false;
                gameMode = null;
                score = 0;
                currentQuestionIndex = 0;
                showFeedback = false;
            }
        }

        // Allow submitting with Enter key
        answerInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // Initialize the app when the page loads
        window.onload = initApp;
    </script>
</body>
</html>
